[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# pyflakes (F) + erreurs pycodestyle (E) + tri des imports (I) + warnings (W).
select = ["E", "F", "I", "W"]
# E501 (longueur de ligne) ignoré : commentaires français explicatifs longs.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Les tests utilisent des fixtures/mocks ; imports « inutilisés » tolérés.
"tests/*" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
