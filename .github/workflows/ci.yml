# CI — frontend (typecheck + build) et backend (lint + tests).
# Les tests backend mockent tous les appels modèle/LLM (Ollama, Chroma, Whisper,
# Piper, RAGAS) : la CI tourne sans Ollama ni modèles téléchargés, avec les
# dépendances légères de requirements-ci.txt.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (tsc --noEmit)
        run: npm run lint
      - name: Build (tsc -b && vite build)
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt
      - name: Install (deps CI légères)
        run: pip install -r requirements-ci.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest, modèles mockés)
        run: pytest
