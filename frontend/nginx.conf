server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets texte.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/wasm;

    # Cache long pour les assets fingerprintés ; jamais pour index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute route (/, /app, …) renvoie index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
